<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Water Simulator</title>
        <link rel="stylesheet" href="style.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Doto:wght@666&family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet">
    </head>
    <body>

        <div class="title">Water Simulator</div>

        <div class="water-sim">

            <canvas id="canvas"></canvas>

            <div id="ui">

                <div class="sliders">
                    <div class="slider-row">
                        <span>Wind</span>
                        <input type="range" id="wind" min="0" max="100"
                            value="40">
                    </div>
                    <div class="slider-row">
                        <span>Chop</span>
                        <input type="range" id="chop" min="0" max="100"
                            value="50">
                    </div>
                </div>
            </div>

            <div id="hint">Click and drag to create ripples</div>

        </div>

        <script src="script.js"></script>

    </body>

</html>
